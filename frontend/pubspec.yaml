name: frontend
description: A real-time chat application built with Flutter and Material 3.
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  socket_io_client: ^2.0.3+1
  http: ^1.2.1
  shared_preferences: ^2.2.3
  image_picker: ^1.1.2
  intl: ^0.19.0
  flutter_spinkit: ^5.2.1
  cached_network_image: ^3.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
